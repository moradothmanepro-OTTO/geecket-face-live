<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#08090a" />
<title>GEECKET · LIVE FACE</title>
<meta name="description" content="Step into the GEECKET point-cloud. Real-time face visual, live in your browser." />
<meta property="og:title" content="GEECKET · LIVE FACE" />
<meta property="og:description" content="Become the point-cloud. Tap to enter — camera stays on your device." />
<meta property="og:type" content="website" />

<style>
  :root{ --lime:#c6ff3a; --purple:#aa3cc8; --grafite:#1c1d1f; --ink:#08090a; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--ink);overflow:hidden;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:#fff}
  #app{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}
  #cam{position:absolute;width:2px;height:2px;opacity:0;pointer-events:none;left:-10px;top:-10px}

  #fx{position:fixed;inset:0;pointer-events:none;z-index:5;mix-blend-mode:overlay;opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.35) 2px 3px);}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(120% 120% at 50% 45%, transparent 55%, rgba(0,0,0,.6) 100%);}

  #intro{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:26px;
    background:radial-gradient(80% 80% at 50% 40%, #111315 0%, #08090a 70%);
    transition:opacity .6s ease}
  .mark{font-weight:800;letter-spacing:.42em;font-size:clamp(34px,9vw,76px);
    text-indent:.42em;color:#fff;text-shadow:0 0 24px rgba(198,255,58,.35)}
  .mark b{color:var(--lime);font-weight:800}
  .sub{font-size:12px;letter-spacing:.5em;text-indent:.5em;color:#8b8f93;text-transform:uppercase}
  .enter{margin-top:8px;border:1px solid rgba(198,255,58,.6);background:rgba(198,255,58,.06);
    color:var(--lime);font-weight:700;letter-spacing:.28em;text-indent:.28em;
    font-size:14px;padding:16px 34px;border-radius:999px;cursor:pointer;
    transition:transform .15s ease, background .2s ease, box-shadow .3s ease;
    box-shadow:0 0 0 rgba(198,255,58,0)}
  .enter:hover{background:rgba(198,255,58,.14);box-shadow:0 0 30px rgba(198,255,58,.25)}
  .enter:active{transform:scale(.96)}
  .note{font-size:11px;letter-spacing:.12em;color:#5d6065;max-width:300px;line-height:1.6}
  .note .pill{color:#9aa0a4}

  #load{position:fixed;inset:0;z-index:18;display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;background:var(--ink)}
  #load.show{display:flex}
  .ring{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.12);
    border-top-color:var(--lime);animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #load .lbl{font-size:11px;letter-spacing:.4em;text-indent:.4em;color:#8b8f93;text-transform:uppercase}

  #hud{position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom);z-index:12;
    display:none;align-items:center;justify-content:center;gap:10px;padding:16px;pointer-events:none}
  #hud.show{display:flex}
  .btn{pointer-events:auto;border:1px solid rgba(255,255,255,.14);background:rgba(20,22,24,.6);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#cfd2d4;
    font-size:11px;letter-spacing:.18em;text-indent:.18em;font-weight:600;text-transform:uppercase;
    padding:11px 16px;border-radius:999px;cursor:pointer;transition:all .18s ease}
  .btn:active{transform:scale(.95)}
  .btn.on{color:var(--lime);border-color:rgba(198,255,58,.5);background:rgba(198,255,58,.08)}
  #brand{position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:12;display:none;
    justify-content:center;padding:18px;pointer-events:none}
  #brand.show{display:flex}
  #brand .w{font-weight:800;letter-spacing:.36em;text-indent:.36em;font-size:13px;color:#fff;opacity:.85}
  #brand .w b{color:var(--lime)}

  #toast{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);z-index:14;
    font-size:12px;letter-spacing:.16em;color:#aeb2b5;background:rgba(10,11,12,.55);
    padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.08);
    opacity:0;transition:opacity .5s ease;text-align:center;line-height:1.7;pointer-events:none}
  #toast.show{opacity:1}

  #err{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;gap:16px;
    align-items:center;justify-content:center;text-align:center;padding:24px;background:var(--ink)}
  #err.show{display:flex}
  #err h2{color:var(--lime);letter-spacing:.1em;font-size:18px;margin:0}
  #err p{color:#9aa0a4;font-size:13px;line-height:1.7;max-width:340px;margin:0}
</style>
</head>
<body>
<div id="app"></div>
<video id="cam" playsinline autoplay muted></video>

<div id="fx"></div>
<div id="vig"></div>

<div id="brand"><span class="w">GEE<b>CKET</b></span></div>

<div id="intro">
  <div class="mark">GEE<b>CKET</b></div>
  <div class="sub">Live Face · point&nbsp;cloud</div>
  <button class="enter" id="enterBtn">ENTER</button>
  <div class="note">Allow the camera to step inside the cloud.<br/>
    <span class="pill">Your video never leaves this device</span> — it's drawn, not uploaded.</div>
</div>

<div id="load"><div class="ring"></div><div class="lbl">summoning the cloud</div></div>

<div id="toast"></div>

<div id="hud">
  <button class="btn" id="burstBtn">◇ Burst</button>
  <button class="btn" id="soundBtn">◉ Sound</button>
  <button class="btn" id="lookBtn">↻ Look</button>
</div>

<div id="err">
  <h2 id="errTitle">Couldn't start</h2>
  <p id="errMsg"></p>
  <button class="enter" id="retryBtn">RETRY</button>
</div>

<!-- CLASSIC guard: runs even if the ES module / CDN libs fail. Surfaces the
     real reason on-screen instead of a silently dead button. -->
<script>
(function(){
  function showErr(title, msg){
    try{
      var e=document.getElementById('err');
      document.getElementById('errTitle').textContent=title||"Couldn't start";
      document.getElementById('errMsg').textContent=msg||'';
      var l=document.getElementById('load'); if(l) l.classList.remove('show');
      var i=document.getElementById('intro'); if(i){ i.style.opacity=''; i.style.display=''; }
      e.classList.add('show');
    }catch(_){}
  }
  window.__geecketErr = showErr;
  // catch uncaught errors AND failed resource loads (capture phase)
  window.addEventListener('error', function(ev){
    if(window.__geecketReady) return; // module already running — let its own handlers deal
    var src = (ev.target && (ev.target.src||ev.target.href)) || ev.filename || '';
    var m = ev.message || (src ? ('failed to load '+src) : 'a script failed to load');
    showErr('Scripts blocked', m + '  ·  In Brave, click the Shield (lion) → turn Shields DOWN for this page, then reload. Safari or Chrome also work.');
  }, true);
  // watchdog: the inline module flips __geecketReady within a few ms; if not, it never ran.
  window.addEventListener('load', function(){
    setTimeout(function(){
      if(!window.__geecketReady){
        showErr('Scripts blocked',
          'The page script did not run (blocked by the browser or an extension). In Brave, click the Shield icon → turn Shields DOWN for this site, then reload. Safari and Chrome work too.');
      }
    }, 4000);
  });
})();
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
  }
}
</script>

<script type="module">
// =====================================================================
//  GEECKET · LIVE FACE — robust boot.
//  The button is wired FIRST. All CDN libraries (three.js + MediaPipe)
//  are DYNAMICALLY imported on ENTER, so a blocked/slow CDN can never
//  leave a dead button — it shows an on-screen reason instead.
// =====================================================================

const LIME_HEX = 0xc6ff3a, PURPLE_HEX = 0xaa3cc8;
const LOOKS = [
  { name: "POINTCLOUD", size: 2.4, bloom: 0.95, limeMix: 0.62, useVideo: 1.0 },
  { name: "WIREFRAME",  size: 1.7, bloom: 0.80, limeMix: 0.95, useVideo: 0.15 },
  { name: "INFRARED",   size: 2.6, bloom: 1.15, limeMix: 0.0,  useVideo: 1.0 },
];
let lookIdx = 0;

const $ = (id) => document.getElementById(id);
const els = {
  cam: $("cam"), intro: $("intro"), load: $("load"), hud: $("hud"), brand: $("brand"),
  toast: $("toast"), err: $("err"), errMsg: $("errMsg"),
  enter: $("enterBtn"), retry: $("retryBtn"), burst: $("burstBtn"), sound: $("soundBtn"), look: $("lookBtn"),
};

// ---- wire the gate BEFORE anything that can throw ----
els.enter.addEventListener("click", () => start());
els.retry.addEventListener("click", () => { els.err.classList.remove("show"); start(); });
els.burst.addEventListener("click", (e) => { e.stopPropagation(); triggerBurst(1); });
els.sound.addEventListener("click", (e) => { e.stopPropagation(); toggleSound(); });
els.look.addEventListener("click", (e) => { e.stopPropagation(); cycleLook(); });
window.__geecketReady = true;  // tell the watchdog the module is alive

function showError(title, msg) {
  els.load.classList.remove("show");
  $("errTitle").textContent = title;
  els.errMsg.textContent = msg;
  els.err.classList.add("show");
}
function showToast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => els.toast.classList.remove("show"), 1900);
}

// ---- lazily-loaded libs + GL state ----
let THREE, EffectComposer, RenderPass, UnrealBloomPass, ShaderPass, OutputPass, FaceLandmarker, FilesetResolver;
let renderer, scene, camera, composer, bloom, chroma, DPR = 1, IS_MOBILE = false;
let points = null, geo = null, mat = null, videoTex = null;
let plan = null, positions = null, uvs = null, N = 0;
let landmarker = null, analyser = null, freqData = null, prevBass = 0, camAspect = 1;
let booting = false, looping = false;

const state = { burst: 0, audio: 0, chroma: 0, lastFace: null, t0: 0, autoBurstAt: 8000 };

async function loadLibs() {
  if (THREE) return;
  THREE = await import("three");
  const pp = "three/addons/postprocessing/";
  EffectComposer  = (await import(pp + "EffectComposer.js")).EffectComposer;
  RenderPass      = (await import(pp + "RenderPass.js")).RenderPass;
  UnrealBloomPass = (await import(pp + "UnrealBloomPass.js")).UnrealBloomPass;
  ShaderPass      = (await import(pp + "ShaderPass.js")).ShaderPass;
  OutputPass      = (await import(pp + "OutputPass.js")).OutputPass;
}

// ---------------------------------------------------------------------------
function initGL() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  // acquire a WebGL2 context permissively — allow software fallback so Brave /
  // HW-accel-off / no-discrete-GPU setups can still get a context.
  const glCanvas = document.createElement("canvas");
  const glOpts = { antialias: true, alpha: false, powerPreference: "default", failIfMajorPerformanceCaveat: false };
  const gl = glCanvas.getContext("webgl2", glOpts);
  if (!gl) throw new Error("Error creating WebGL context (WebGL2 unavailable)");
  renderer = new THREE.WebGLRenderer({ canvas: glCanvas, context: gl, antialias: true });
  renderer.setPixelRatio(DPR);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x08090a, 1);
  $("app").appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 2.05);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    IS_MOBILE ? 0.7 : 0.95, 0.6, 0.0);
  composer.addPass(bloom);

  const ChromaShader = {
    uniforms: { tDiffuse: { value: null }, uAmount: { value: 0.0 } },
    vertexShader: "varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} ",
    fragmentShader: "uniform sampler2D tDiffuse; uniform float uAmount; varying vec2 vUv;" +
      "void main(){ vec2 d=vec2(uAmount,0.0);" +
      "float r=texture2D(tDiffuse,vUv+d).r; float g=texture2D(tDiffuse,vUv).g; float b=texture2D(tDiffuse,vUv-d).b;" +
      "gl_FragColor=vec4(r,g,b,1.0);} ",
  };
  chroma = new ShaderPass(ChromaShader);
  composer.addPass(chroma);
  composer.addPass(new OutputPass());

  renderer.domElement.addEventListener("pointerdown", () => {
    const now = performance.now();
    if (now - (renderer.domElement._lastTap || 0) < 300) state.chroma = 1; // double-tap glitch
    else triggerBurst(1);
    renderer.domElement._lastTap = now;
  });
  window.addEventListener("resize", onResize);
}

function onResize() {
  if (!renderer) return;
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
}

// ---------------------------------------------------------------------------
function buildCloud() {
  if (points) return;
  const tess = FaceLandmarker.FACE_LANDMARKS_TESSELATION;   // [{start,end},...]
  const samples = IS_MOBILE ? [0.5] : [0.34, 0.68];
  const arr = [];
  for (let i = 0; i < 478; i++) arr.push({ a: i, b: i, t: 0 });
  for (const c of tess) for (const t of samples) arr.push({ a: c.start, b: c.end, t });

  N = arr.length;
  plan = arr.map((p, i) => {
    const r = (s) => { const x = Math.sin((i + 1) * 12.9898 + s * 78.233) * 43758.5453; return x - Math.floor(x); };
    return { a: p.a, b: p.b, t: p.t, phase: r(1) * Math.PI * 2,
             sx: (r(2) - 0.5) * 2, sy: (r(3) - 0.5) * 2, sz: (r(4) - 0.5) * 2 };
  });

  positions = new Float32Array(N * 3);
  uvs = new Float32Array(N * 2);
  geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setAttribute("aUv", new THREE.BufferAttribute(uvs, 2));

  videoTex = new THREE.VideoTexture(els.cam);
  videoTex.colorSpace = THREE.SRGBColorSpace;
  videoTex.flipY = false;
  videoTex.minFilter = THREE.LinearFilter;
  videoTex.magFilter = THREE.LinearFilter;

  const L = LOOKS[lookIdx];
  mat = new THREE.ShaderMaterial({
    uniforms: {
      uMap: { value: videoTex }, uSize: { value: L.size }, uDpr: { value: DPR }, uAudio: { value: 0 },
      uLime: { value: new THREE.Color(LIME_HEX) }, uPurple: { value: new THREE.Color(PURPLE_HEX) },
      uLimeMix: { value: L.limeMix }, uUseVideo: { value: L.useVideo },
    },
    vertexShader: `
      attribute vec2 aUv; varying vec2 vUv;
      uniform float uSize, uDpr, uAudio;
      void main(){
        vUv = aUv;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = uSize * uDpr * (1.0 + uAudio * 0.9) * (1.0 / max(0.15, -mv.z));
      }`,
    fragmentShader: `
      precision highp float;
      uniform sampler2D uMap; uniform vec3 uLime, uPurple;
      uniform float uLimeMix, uUseVideo, uAudio; varying vec2 vUv;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float fall = smoothstep(0.5, 0.0, d);
        vec3 vid = texture2D(uMap, vUv).rgb;
        float lum = dot(vid, vec3(0.299, 0.587, 0.114));
        vec3 base = mix(uLime, vid, uUseVideo * 0.4);
        vec3 col = mix(vid * 0.4 + uLime * 0.6, base, 1.0 - uLimeMix);
        col = mix(col, uPurple, smoothstep(0.72, 1.0, lum));
        col *= (0.55 + 0.95 * lum + 0.35 * uAudio);
        gl_FragColor = vec4(col * fall, fall);
      }`,
    transparent: true, blending: THREE.AdditiveBlending, depthTest: false, depthWrite: false,
  });

  points = new THREE.Points(geo, mat);
  scene.add(points);
}

const A = { x: 0, y: 0, z: 0 }, B = { x: 0, y: 0, z: 0 };
function lmToWorld(lm, out) {
  out.x = (0.5 - lm.x) * 1.9 * camAspect;   // mirror X (selfie)
  out.y = (0.5 - lm.y) * 1.9;
  out.z = -lm.z * 1.9;
  return out;
}

// ---------------------------------------------------------------------------
async function initFace() {
  const mp = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs");
  FilesetResolver = mp.FilesetResolver; FaceLandmarker = mp.FaceLandmarker;
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
  landmarker = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU",
    },
    outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1,
  });
}

// ---- optional mic reactivity ----
async function toggleSound() {
  if (analyser) { analyser = null; els.sound.classList.remove("on"); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const src = ac.createMediaStreamSource(stream);
    analyser = ac.createAnalyser(); analyser.fftSize = 1024; src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    els.sound.classList.add("on"); showToast("listening — play your beat");
  } catch (e) { showToast("mic blocked"); }
}
function readAudio() {
  if (!analyser) { state.audio *= 0.92; return; }
  analyser.getByteFrequencyData(freqData);
  let b = 0; for (let i = 0; i < 8; i++) b += freqData[i];
  b = b / (8 * 255);
  const onset = Math.max(0, b - prevBass); prevBass = b;
  state.audio += (b - state.audio) * 0.3;
  if (onset > 0.12) { triggerBurst(0.55); state.chroma = Math.min(1, state.chroma + onset * 2.5); }
}

// ---- interactions ----
function triggerBurst(amount = 1) { state.burst = Math.min(1, state.burst + amount); }
function cycleLook() {
  if (!mat) return;
  lookIdx = (lookIdx + 1) % LOOKS.length;
  const L = LOOKS[lookIdx];
  mat.uniforms.uSize.value = L.size;
  mat.uniforms.uLimeMix.value = L.limeMix;
  mat.uniforms.uUseVideo.value = L.useVideo;
  bloom.strength = (IS_MOBILE ? 0.75 : 1.0) * (L.bloom / 0.95);
  showToast(L.name);
}

// ---------------------------------------------------------------------------
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();
  const time = (now - state.t0) / 1000;

  if (landmarker && els.cam.readyState >= 2) {
    const res = landmarker.detectForVideo(els.cam, now);
    if (res.faceLandmarks && res.faceLandmarks.length) state.lastFace = res.faceLandmarks[0];
  }
  readAudio();

  if (!analyser && now - state.t0 > state.autoBurstAt) {
    triggerBurst(0.8); state.autoBurstAt = (now - state.t0) + 7000 + Math.random() * 4000;
  }
  state.burst *= 0.94; state.chroma *= 0.85;

  const face = state.lastFace;
  if (face && positions) {
    const burst = state.burst, swell = 1 + state.audio * 0.18;
    for (let i = 0; i < N; i++) {
      const p = plan[i];
      lmToWorld(face[p.a], A);
      if (p.b !== p.a) {
        lmToWorld(face[p.b], B);
        A.x += (B.x - A.x) * p.t; A.y += (B.y - A.y) * p.t; A.z += (B.z - A.z) * p.t;
      }
      const sh = Math.sin(time * 2.0 + p.phase) * 0.012;
      let x = A.x * swell, y = A.y * swell, z = A.z * swell + sh;
      if (burst > 0.001) {
        const e = burst * burst, len = Math.hypot(A.x, A.y) + 1e-4;
        x += (A.x / len) * e * 0.5 + p.sx * e * 0.55;
        y += (A.y / len) * e * 0.5 + p.sy * e * 0.55 + e * 0.12;
        z += p.sz * e * 0.55;
      }
      const o = i * 3; positions[o] = x; positions[o + 1] = y; positions[o + 2] = z;
      const la = face[p.a], lb = (p.b !== p.a) ? face[p.b] : la, u = i * 2;
      uvs[u] = la.x + (lb.x - la.x) * p.t;
      uvs[u + 1] = la.y + (lb.y - la.y) * p.t;
    }
    geo.attributes.position.needsUpdate = true;
    geo.attributes.aUv.needsUpdate = true;
    points.rotation.y = Math.sin(time * 0.25) * 0.18;
  }

  if (mat) mat.uniforms.uAudio.value = state.audio;
  chroma.uniforms.uAmount.value = state.chroma * 0.006;
  composer.render();
}

// ---------------------------------------------------------------------------
async function start() {
  if (booting) return;
  booting = true;
  els.err.classList.remove("show");
  els.intro.style.opacity = "0";
  setTimeout(() => (els.intro.style.display = "none"), 600);
  els.load.classList.add("show");

  // 1. camera first — keeps the iOS user-gesture intact and prompts instantly
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: false, video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
    });
  } catch (e) {
    booting = false;
    return showError(
      e && e.name === "NotAllowedError" ? "Camera blocked" : "No camera",
      e && e.name === "NotAllowedError"
        ? "GEECKET needs the camera to draw you — allow it and hit RETRY. Nothing is uploaded."
        : "Couldn't reach a camera here. Try another device or browser."
    );
  }
  els.cam.srcObject = stream;
  await els.cam.play().catch(() => {});
  await new Promise((r) => { if (els.cam.videoWidth) return r(); els.cam.onloadedmetadata = () => r(); });
  camAspect = (els.cam.videoWidth / els.cam.videoHeight) || 1;

  // 2. load 3D libs (dynamic — failures show on screen, never a dead button)
  try { await loadLibs(); }
  catch (e) {
    booting = false;
    return showError("3D engine blocked",
      "Couldn't load three.js from the CDN. In Brave, lower the Shield for this site and RETRY — or use Safari/Chrome. (" + (e && e.message || e) + ")");
  }
  try { if (!renderer) initGL(); }
  catch (e) {
    booting = false;
    return showError("WebGL unavailable",
      "Brave is blocking WebGL. Quick fix: open this link in Safari. To fix Brave: brave://settings/system → turn ON 'Use hardware acceleration', relaunch; and Shield (lion) → set Fingerprint blocking to 'Allow' for this site, then RETRY. (" + (e && e.message || e) + ")");
  }

  // 3. face model
  try { await initFace(); }
  catch (e) {
    booting = false;
    return showError("Face model blocked",
      "Couldn't download the face engine (CDN blocked or offline). Lower Brave Shields for this site and RETRY. (" + (e && e.message || e) + ")");
  }
  buildCloud();

  // 4. go live
  state.t0 = performance.now();
  els.load.classList.remove("show");
  els.hud.classList.add("show");
  els.brand.classList.add("show");
  showToast("tap = burst · double-tap = glitch · ◉ sound");
  if (!looping) { looping = true; frame(); }
}
</script>
</body>
</html>
