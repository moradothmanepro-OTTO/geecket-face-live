<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#08090a" />
<title>GEECKET · LIVE FACE</title>
<meta name="description" content="Step into the GEECKET point-cloud. Real-time face visual, live in your browser." />
<meta property="og:title" content="GEECKET · LIVE FACE" />
<meta property="og:description" content="Become the point-cloud. Tap to enter — camera stays on your device." />
<meta property="og:type" content="website" />

<style>
  :root{ --lime:#c6ff3a; --purple:#aa3cc8; --grafite:#1c1d1f; --ink:#08090a; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--ink);overflow:hidden;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:#fff}
  #app{position:fixed;inset:0;z-index:2}
  canvas{display:block;width:100%;height:100%}
  /* video MUST be on-screen + non-zero for iOS to produce frames (issue #3576);
     it sits behind the opaque render canvas, so it's effectively invisible. */
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.001;pointer-events:none}
  #diag{position:fixed;left:8px;bottom:8px;z-index:40;max-width:94vw;
    font:11px/1.5 ui-monospace,Menlo,monospace;color:#9ef01a;background:rgba(0,0,0,.74);
    border:1px solid rgba(158,240,26,.35);border-radius:8px;padding:8px 10px;white-space:pre;
    pointer-events:none;display:none}
  #diag.show{display:block}

  #fx{position:fixed;inset:0;pointer-events:none;z-index:5;mix-blend-mode:overlay;opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.35) 2px 3px);}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(120% 120% at 50% 45%, transparent 55%, rgba(0,0,0,.6) 100%);}

  #intro{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:26px;
    background:radial-gradient(80% 80% at 50% 40%, #111315 0%, #08090a 70%);
    transition:opacity .6s ease}
  .mark{font-weight:800;letter-spacing:.42em;font-size:clamp(34px,9vw,76px);
    text-indent:.42em;color:#fff;text-shadow:0 0 24px rgba(198,255,58,.35)}
  .mark b{color:var(--lime);font-weight:800}
  .sub{font-size:12px;letter-spacing:.5em;text-indent:.5em;color:#8b8f93;text-transform:uppercase}
  .enter{margin-top:8px;border:1px solid rgba(198,255,58,.6);background:rgba(198,255,58,.06);
    color:var(--lime);font-weight:700;letter-spacing:.28em;text-indent:.28em;
    font-size:14px;padding:16px 34px;border-radius:999px;cursor:pointer;
    transition:transform .15s ease, background .2s ease, box-shadow .3s ease}
  .enter:hover{background:rgba(198,255,58,.14);box-shadow:0 0 30px rgba(198,255,58,.25)}
  .enter:active{transform:scale(.96)}
  .note{font-size:11px;letter-spacing:.12em;color:#5d6065;max-width:300px;line-height:1.6}
  .note .pill{color:#9aa0a4}

  #load{position:fixed;inset:0;z-index:18;display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;background:var(--ink)}
  #load.show{display:flex}
  .ring{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.12);
    border-top-color:var(--lime);animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #load .lbl{font-size:11px;letter-spacing:.4em;text-indent:.4em;color:#8b8f93;text-transform:uppercase}

  #hud{position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom);z-index:12;
    display:none;align-items:center;justify-content:center;gap:10px;padding:16px;pointer-events:none}
  #hud.show{display:flex}
  .btn{pointer-events:auto;border:1px solid rgba(255,255,255,.14);background:rgba(20,22,24,.6);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#cfd2d4;
    font-size:11px;letter-spacing:.18em;text-indent:.18em;font-weight:600;text-transform:uppercase;
    padding:11px 16px;border-radius:999px;cursor:pointer;transition:all .18s ease}
  .btn:active{transform:scale(.95)}
  .btn.on{color:var(--lime);border-color:rgba(198,255,58,.5);background:rgba(198,255,58,.08)}
  #recBtn.on{color:#ff5a5a;border-color:rgba(255,90,90,.6);background:rgba(255,90,90,.14);
    animation:recpulse 1.1s ease-in-out infinite}
  @keyframes recpulse{0%,100%{opacity:1}50%{opacity:.55}}
  #brand{position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:12;display:none;
    justify-content:center;padding:18px;pointer-events:none}
  #brand.show{display:flex}
  #brand .w{font-weight:800;letter-spacing:.36em;text-indent:.36em;font-size:13px;color:#fff;opacity:.85}
  #brand .w b{color:var(--lime)}
  #brand .tag{font-size:9px;letter-spacing:.3em;color:#6b6f73;margin-left:10px;align-self:center}

  #toast{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);z-index:14;
    font-size:12px;letter-spacing:.16em;color:#aeb2b5;background:rgba(10,11,12,.55);
    padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.08);
    opacity:0;transition:opacity .5s ease;text-align:center;line-height:1.7;pointer-events:none}
  #toast.show{opacity:1}

  #err{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;gap:16px;
    align-items:center;justify-content:center;text-align:center;padding:24px;background:var(--ink)}
  #err.show{display:flex}
  #err h2{color:var(--lime);letter-spacing:.1em;font-size:18px;margin:0}
  #err p{color:#9aa0a4;font-size:13px;line-height:1.7;max-width:340px;margin:0}
</style>
</head>
<body>
<div id="app"></div>
<video id="cam" playsinline autoplay muted></video>

<div id="fx"></div>
<div id="vig"></div>

<div id="brand"><span class="w">GEE<b>CKET</b></span><span class="tag" id="modeTag"></span></div>

<div id="intro">
  <div class="mark">GEE<b>CKET</b></div>
  <div class="sub">Live Face · point&nbsp;cloud</div>
  <button class="enter" id="enterBtn">ENTER</button>
  <div class="note">Allow the camera to step inside the cloud.<br/>
    <span class="pill">Your video never leaves this device</span> — it's drawn, not uploaded.</div>
</div>

<div id="load"><div class="ring"></div><div class="lbl" id="loadLbl">summoning the cloud</div></div>

<div id="toast"></div>
<pre id="diag"></pre>

<div id="hud">
  <button class="btn" id="recBtn">● Rec</button>
  <button class="btn" id="burstBtn">◇ Burst</button>
  <button class="btn" id="soundBtn">◉ Sound</button>
  <button class="btn" id="lookBtn">↻ Look</button>
</div>

<div id="err">
  <h2 id="errTitle">Couldn't start</h2>
  <p id="errMsg"></p>
  <button class="enter" id="retryBtn">RETRY</button>
</div>

<!-- CLASSIC guard: runs even if the ES module / CDN libs fail. -->
<script>
(function(){
  function showErr(title, msg){
    try{
      document.getElementById('errTitle').textContent=title||"Couldn't start";
      document.getElementById('errMsg').textContent=msg||'';
      var l=document.getElementById('load'); if(l) l.classList.remove('show');
      var i=document.getElementById('intro'); if(i){ i.style.opacity=''; i.style.display=''; }
      document.getElementById('err').classList.add('show');
    }catch(_){}
  }
  window.__geecketErr = showErr;
  window.addEventListener('error', function(ev){
    if(window.__geecketReady) return;
    var src=(ev.target&&(ev.target.src||ev.target.href))||ev.filename||'';
    var m=ev.message||(src?('failed to load '+src):'a script failed to load');
    showErr('Scripts blocked', m+'  ·  In Brave, click the Shield (lion) → Shields DOWN for this page, then reload. Safari or Chrome also work.');
  }, true);
  window.addEventListener('load', function(){
    setTimeout(function(){
      if(!window.__geecketReady){
        showErr('Scripts blocked','The page script did not run (blocked by the browser or an extension). In Brave, Shield icon → Shields DOWN for this site, then reload. Safari and Chrome work too.');
      }
    }, 4000);
  });
})();
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
  }
}
</script>

<script type="module">
// =====================================================================
//  GEECKET · LIVE FACE — works for ALL users.
//  - Button wired first; CDN libs loaded dynamically on ENTER.
//  - WebGL2 available  → GPU path (three.js + bloom), MediaPipe GPU.
//  - WebGL2 blocked    → CPU path (Canvas2D additive glow), MediaPipe CPU.
//  Face tracking is WASM and runs in both paths, so nobody hits a wall.
// =====================================================================

const LIME_HEX = 0xc6ff3a, PURPLE_HEX = 0xaa3cc8;
const LIME_CSS = "#c6ff3a", PURPLE_CSS = "#aa3cc8";
const LOOKS = [
  { name: "POINTCLOUD", size: 2.4, bloom: 0.95, limeMix: 0.62, useVideo: 1.0, limeOnly: false },
  { name: "WIREFRAME",  size: 1.7, bloom: 0.80, limeMix: 0.95, useVideo: 0.15, limeOnly: true },
  { name: "INFRARED",   size: 2.6, bloom: 1.15, limeMix: 0.0,  useVideo: 1.0, limeOnly: false },
];
let lookIdx = 0;

const $ = (id) => document.getElementById(id);
const els = {
  cam: $("cam"), intro: $("intro"), load: $("load"), hud: $("hud"), brand: $("brand"),
  toast: $("toast"), err: $("err"), errMsg: $("errMsg"), modeTag: $("modeTag"),
  enter: $("enterBtn"), retry: $("retryBtn"), burst: $("burstBtn"), sound: $("soundBtn"), look: $("lookBtn"), rec: $("recBtn"),
};

// ---- wire the gate BEFORE anything that can throw ----
els.enter.addEventListener("click", () => start());
els.retry.addEventListener("click", () => { els.err.classList.remove("show"); start(); });
els.burst.addEventListener("click", (e) => { e.stopPropagation(); triggerBurst(1); });
els.sound.addEventListener("click", (e) => { e.stopPropagation(); toggleSound(); });
els.look.addEventListener("click", (e) => { e.stopPropagation(); cycleLook(); });
els.rec.addEventListener("click", (e) => { e.stopPropagation(); toggleRec(); });
window.addEventListener("pointerdown", onTap);
window.__geecketReady = true;

function showError(title, msg) { if (!lastErr) lastErr = title; els.load.classList.remove("show"); $("errTitle").textContent = title; els.errMsg.textContent = msg; els.err.classList.add("show"); showDiag(); }
function showToast(msg) { els.toast.textContent = msg; els.toast.classList.add("show"); clearTimeout(showToast._t); showToast._t = setTimeout(() => els.toast.classList.remove("show"), 1900); }
function setStatus(s) { const l = $("loadLbl"); if (l) l.textContent = s; }
function withTimeout(p, ms, label) { return Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error("timed out: " + label)), ms))]); }

// ---- libs + shared state ----
let THREE, EffectComposer, RenderPass, UnrealBloomPass, ShaderPass, OutputPass, FaceLandmarker, FilesetResolver;
let MODE = "gpu";                 // "gpu" | "cpu"
let landmarker = null, analyser = null, freqData = null, prevBass = 0, camAspect = 1;
let audioCtx = null, micDest = null, micStream = null;
let rec = null, recCanvas = null, recCtx = null, recChunks = [], recording = false;
let plan = null, positions = null, uvs = null, N = 0;
let booting = false, looping = false;
const state = { burst: 0, audio: 0, chroma: 0, lastFace: null, t0: 0, autoBurstAt: 8000 };

// GPU state
let renderer, scene, camera, composer, bloom, chroma, mat, geo, points, videoTex, DPR = 1;
// CPU state
let c2, ctx2d, glowLime, glowPurple, glowBlue, vidCanvas, vidCtx, DPR2 = 1;

const IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);  // iPadOS masquerades as Mac
let lastTs = 0, lastErr = "", faceEver = false, noFaceHinted = false;

// ---- on-device diagnostic: one screenshot tells us exactly what's wrong ----
async function runDiag() {
  const el = $("diag"); if (!el) return;
  let cams = "?", perm = "?";
  try { cams = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === "videoinput").length; } catch (_) {}
  try { perm = (await navigator.permissions.query({ name: "camera" })).state; } catch (_) { perm = "n/a"; }
  const v = els.cam;
  // average brightness of the live frame — 0.00 means the camera sees black (covered/closed lid)
  let lum = "?";
  try {
    if (v && v.videoWidth) {
      if (!runDiag._c) { runDiag._c = document.createElement("canvas"); runDiag._c.width = runDiag._c.height = 24; runDiag._x = runDiag._c.getContext("2d", { willReadFrequently: true }); }
      runDiag._x.drawImage(v, 0, 0, 24, 24);
      const d = runDiag._x.getImageData(0, 0, 24, 24).data; let s = 0;
      for (let i = 0; i < d.length; i += 4) s += d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
      lum = (s / (24 * 24) / 255).toFixed(2);
    }
  } catch (_) {}
  el.textContent =
    "GEECKET diag\n" +
    "secure:" + window.isSecureContext + "  gUM:" + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) + "\n" +
    "perm:" + perm + "  cams:" + cams + "\n" +
    "video: rs" + (v ? v.readyState : "?") + " " + (v ? v.videoWidth : "?") + "x" + (v ? v.videoHeight : "?") +
      " active:" + (v && v.srcObject ? v.srcObject.active : "-") + " lum:" + lum + "\n" +
    "mode:" + MODE + " webgl2:" + hasWebGL2() + " ios:" + IS_IOS + "\n" +
    "three:" + (typeof THREE === "undefined" ? "no" : "yes") + " face:" + (landmarker ? "ok" : "-") +
      " seen:" + (state.lastFace ? "Y" : "n") + "\n" +
    "err:" + (lastErr || "-") + "\n" +
    "ua:" + navigator.userAgent.slice(0, 48);
}
function showDiag() { const el = $("diag"); if (el) el.classList.add("show"); runDiag(); if (!showDiag._t) showDiag._t = setInterval(runDiag, 1500); }

// ---------------------------------------------------------------------------
function hasWebGL2() {
  try {
    const c = document.createElement("canvas");
    return !!c.getContext("webgl2", { failIfMajorPerformanceCaveat: false });
  } catch (_) { return false; }
}

async function loadThree() {
  if (THREE) return;
  THREE = await import("three");
  const pp = "three/addons/postprocessing/";
  EffectComposer  = (await import(pp + "EffectComposer.js")).EffectComposer;
  RenderPass      = (await import(pp + "RenderPass.js")).RenderPass;
  UnrealBloomPass = (await import(pp + "UnrealBloomPass.js")).UnrealBloomPass;
  ShaderPass      = (await import(pp + "ShaderPass.js")).ShaderPass;
  OutputPass      = (await import(pp + "OutputPass.js")).OutputPass;
}

// ---------------------------------------------------------------------------
//  GPU renderer (three.js)
// ---------------------------------------------------------------------------
function initGPU() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const glCanvas = document.createElement("canvas");
  const gl = glCanvas.getContext("webgl2", { antialias: true, alpha: false, powerPreference: "default", failIfMajorPerformanceCaveat: false });
  if (!gl) throw new Error("webgl2-null");
  renderer = new THREE.WebGLRenderer({ canvas: glCanvas, context: gl, antialias: true });
  renderer.setPixelRatio(DPR);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x08090a, 1);
  $("app").appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 2.05);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), IS_MOBILE ? 0.7 : 0.95, 0.6, 0.0);
  composer.addPass(bloom);
  const ChromaShader = {
    uniforms: { tDiffuse: { value: null }, uAmount: { value: 0.0 } },
    vertexShader: "varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} ",
    fragmentShader: "uniform sampler2D tDiffuse; uniform float uAmount; varying vec2 vUv;" +
      "void main(){ vec2 d=vec2(uAmount,0.0); float r=texture2D(tDiffuse,vUv+d).r; float g=texture2D(tDiffuse,vUv).g; float b=texture2D(tDiffuse,vUv-d).b; gl_FragColor=vec4(r,g,b,1.0);} ",
  };
  chroma = new ShaderPass(ChromaShader);
  composer.addPass(chroma);
  composer.addPass(new OutputPass());
  window.addEventListener("resize", onResize);
}

function buildGPUCloud() {
  geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setAttribute("aUv", new THREE.BufferAttribute(uvs, 2));
  videoTex = new THREE.VideoTexture(els.cam);
  videoTex.colorSpace = THREE.SRGBColorSpace; videoTex.flipY = false;
  videoTex.minFilter = THREE.LinearFilter; videoTex.magFilter = THREE.LinearFilter;
  const L = LOOKS[lookIdx];
  mat = new THREE.ShaderMaterial({
    uniforms: {
      uMap: { value: videoTex }, uSize: { value: L.size }, uDpr: { value: DPR }, uAudio: { value: 0 },
      uLime: { value: new THREE.Color(LIME_HEX) }, uPurple: { value: new THREE.Color(PURPLE_HEX) },
      uLimeMix: { value: L.limeMix }, uUseVideo: { value: L.useVideo },
    },
    vertexShader: `attribute vec2 aUv; varying vec2 vUv; uniform float uSize, uDpr, uAudio;
      void main(){ vUv=aUv; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_Position=projectionMatrix*mv;
        gl_PointSize=uSize*uDpr*(1.0+uAudio*0.9)*(1.0/max(0.15,-mv.z)); }`,
    fragmentShader: `precision highp float; uniform sampler2D uMap; uniform vec3 uLime,uPurple;
      uniform float uLimeMix,uUseVideo,uAudio; varying vec2 vUv;
      void main(){ float d=length(gl_PointCoord-0.5); if(d>0.5) discard; float fall=smoothstep(0.5,0.0,d);
        vec3 vid=texture2D(uMap,vUv).rgb; float lum=dot(vid,vec3(0.299,0.587,0.114));
        vec3 base=mix(uLime,vid,uUseVideo*0.4); vec3 col=mix(vid*0.4+uLime*0.6,base,1.0-uLimeMix);
        col=mix(col,uPurple,smoothstep(0.72,1.0,lum)); col*=(0.55+0.95*lum+0.35*uAudio);
        gl_FragColor=vec4(col*fall,fall); }`,
    transparent: true, blending: THREE.AdditiveBlending, depthTest: false, depthWrite: false,
  });
  points = new THREE.Points(geo, mat);
  scene.add(points);
}

function renderGPU(time) {
  geo.attributes.position.needsUpdate = true;
  geo.attributes.aUv.needsUpdate = true;
  // bass sways the camera + spins faster on energy
  const a = state.audio, beat = state.beat || 0;
  points.rotation.y = Math.sin(time * 0.25) * 0.18 + a * 0.12;
  mat.uniforms.uAudio.value = a;
  // bloom pumps with bass + kick; chroma split is the beat weapon (treble adds bite)
  const L = LOOKS[lookIdx];
  bloom.strength = (IS_MOBILE ? 0.7 : 0.95) * (L.bloom / 0.95) * (1 + a * 0.9 + beat * 0.8);
  chroma.uniforms.uAmount.value = (state.chroma * 0.006) + beat * 0.004 + (state.treble || 0) * 0.001;
  composer.render();
}

function onResize() {
  if (MODE === "gpu" && renderer) {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h); composer.setSize(w, h);
  } else if (MODE === "cpu" && c2) { sizeCPU(); }
}

// ---------------------------------------------------------------------------
//  CPU renderer (Canvas2D) — universal fallback
// ---------------------------------------------------------------------------
function initCPU() {
  DPR2 = Math.min(window.devicePixelRatio || 1, 2);
  c2 = document.createElement("canvas");
  c2.style.cssText = "display:block;width:100%;height:100%";
  $("app").appendChild(c2);
  ctx2d = c2.getContext("2d");
  sizeCPU();
  glowLime = makeGlow(LIME_CSS);
  glowPurple = makeGlow(PURPLE_CSS);
  glowBlue = makeGlow("#3ad0ff");
  vidCanvas = document.createElement("canvas"); vidCanvas.width = vidCanvas.height = 120;
  vidCtx = vidCanvas.getContext("2d", { willReadFrequently: true });
  window.addEventListener("resize", onResize);
}
function sizeCPU() {
  c2.width = Math.floor(window.innerWidth * DPR2);
  c2.height = Math.floor(window.innerHeight * DPR2);
}
function makeGlow(css) {
  const s = document.createElement("canvas"); s.width = s.height = 32;
  const g = s.getContext("2d");
  const grd = g.createRadialGradient(16, 16, 0, 16, 16, 16);
  const rgb = hexToRgb(css);
  grd.addColorStop(0, `rgba(${rgb},1)`);
  grd.addColorStop(0.35, `rgba(${rgb},0.55)`);
  grd.addColorStop(1, `rgba(${rgb},0)`);
  g.fillStyle = grd; g.fillRect(0, 0, 32, 32);
  return s;
}
function hexToRgb(h) { const n = parseInt(h.slice(1), 16); return `${(n >> 16) & 255},${(n >> 8) & 255},${n & 255}`; }

function renderCPU(time) {
  const W = c2.width, H = c2.height;
  ctx2d.globalCompositeOperation = "source-over";
  // dim mirrored camera feed as background — so you can SEE what the camera sees
  try {
    ctx2d.save(); ctx2d.globalAlpha = 0.32; ctx2d.translate(W, 0); ctx2d.scale(-1, 1);
    ctx2d.drawImage(els.cam, 0, 0, W, H); ctx2d.restore();
    ctx2d.globalAlpha = 1;
  } catch (_) {}
  // veil for contrast + slight trail
  ctx2d.fillStyle = "rgba(8,9,10,0.5)";
  ctx2d.fillRect(0, 0, W, H);
  if (!state.lastFace) return;
  ctx2d.globalCompositeOperation = "lighter";

  let data = null;
  try { vidCtx.drawImage(els.cam, 0, 0, 120, 120); data = vidCtx.getImageData(0, 0, 120, 120).data; } catch (_) {}

  const L = LOOKS[lookIdx];
  const beat = state.beat || 0;
  const scale = Math.min(W, H) * 0.42;
  const yaw = Math.sin(time * 0.25) * 0.18 + state.audio * 0.12, cy = Math.cos(yaw), sy = Math.sin(yaw);
  const sizeMul = L.size * 1.5 * DPR2 * (1 + state.audio * 1.1 + beat * 0.7);
  const aBoost = beat * 0.22;

  for (let i = 0; i < N; i++) {
    const o = i * 3;
    let x = positions[o], y = positions[o + 1], z = positions[o + 2];
    const rx = x * cy + z * sy; z = -x * sy + z * cy; x = rx;           // yaw
    const persp = 1 / Math.max(0.2, 1 + z * 0.35);
    const px = W / 2 + x * scale * persp;
    const py = H / 2 - y * scale * persp;
    if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;

    let lum = 0.6;
    if (data) {
      const u = i * 2;
      const sxp = Math.min(119, Math.max(0, (uvs[u] * 120) | 0));
      const syp = Math.min(119, Math.max(0, (uvs[u + 1] * 120) | 0));
      const idx = (syp * 120 + sxp) * 4;
      lum = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255;
    }
    let sprite;
    if (L.limeOnly) sprite = glowLime;
    else if (L.name === "INFRARED") sprite = lum > 0.66 ? glowLime : (lum > 0.4 ? glowPurple : glowBlue);
    else sprite = lum > 0.72 ? glowPurple : glowLime;

    const sz = sizeMul * persp * (0.55 + lum);
    ctx2d.globalAlpha = Math.min(1, 0.22 + lum * 0.85 + aBoost);
    ctx2d.drawImage(sprite, px - sz, py - sz, sz * 2, sz * 2);
  }
  ctx2d.globalAlpha = 1;
  ctx2d.globalCompositeOperation = "source-over";
}

// ---------------------------------------------------------------------------
//  shared: build the point topology + per-frame positions
// ---------------------------------------------------------------------------
function buildPlan() {
  const tess = FaceLandmarker.FACE_LANDMARKS_TESSELATION;
  // CPU is heavier per point → fewer points there
  const samples = (MODE === "gpu") ? (IS_MOBILE ? [0.5] : [0.34, 0.68]) : (IS_MOBILE ? [] : [0.5]);
  const arr = [];
  for (let i = 0; i < 478; i++) arr.push({ a: i, b: i, t: 0 });
  for (const c of tess) for (const t of samples) arr.push({ a: c.start, b: c.end, t });
  N = arr.length;
  plan = arr.map((p, i) => {
    const r = (s) => { const x = Math.sin((i + 1) * 12.9898 + s * 78.233) * 43758.5453; return x - Math.floor(x); };
    return { a: p.a, b: p.b, t: p.t, phase: r(1) * Math.PI * 2, sx: (r(2) - 0.5) * 2, sy: (r(3) - 0.5) * 2, sz: (r(4) - 0.5) * 2 };
  });
  positions = new Float32Array(N * 3);
  uvs = new Float32Array(N * 2);
}

const A = { x: 0, y: 0, z: 0 }, B = { x: 0, y: 0, z: 0 };
function lmToWorld(lm, out) { out.x = (0.5 - lm.x) * 1.9 * camAspect; out.y = (0.5 - lm.y) * 1.9; out.z = -lm.z * 1.9; return out; }

function computePoints(time) {
  const face = state.lastFace;
  if (!face || !positions) return;
  const burst = state.burst, swell = 1 + state.audio * 0.18;
  for (let i = 0; i < N; i++) {
    const p = plan[i];
    lmToWorld(face[p.a], A);
    if (p.b !== p.a) { lmToWorld(face[p.b], B); A.x += (B.x - A.x) * p.t; A.y += (B.y - A.y) * p.t; A.z += (B.z - A.z) * p.t; }
    const sh = Math.sin(time * 2.0 + p.phase) * 0.012;
    let x = A.x * swell, y = A.y * swell, z = A.z * swell + sh;
    if (burst > 0.001) {
      const e = burst * burst, len = Math.hypot(A.x, A.y) + 1e-4;
      x += (A.x / len) * e * 0.5 + p.sx * e * 0.55;
      y += (A.y / len) * e * 0.5 + p.sy * e * 0.55 + e * 0.12;
      z += p.sz * e * 0.55;
    }
    const o = i * 3; positions[o] = x; positions[o + 1] = y; positions[o + 2] = z;
    const la = face[p.a], lb = (p.b !== p.a) ? face[p.b] : la, u = i * 2;
    uvs[u] = la.x + (lb.x - la.x) * p.t;
    uvs[u + 1] = la.y + (lb.y - la.y) * p.t;
  }
}

// ---------------------------------------------------------------------------
async function initFace() {
  // SELF-HOSTED: everything loads from this same origin (the page already
  // reached the user), so no external CDN/region block can break face tracking.
  const f = (n) => new URL("mp/" + n, location.href).href;
  const dir = new URL("mp", location.href).href;
  const mp = await import(f("vision_bundle.js"));
  FilesetResolver = mp.FilesetResolver; FaceLandmarker = mp.FaceLandmarker;
  const fileset = await FilesetResolver.forVisionTasks(dir);
  landmarker = await FaceLandmarker.createFromOptions(fileset, {
    // iOS Safari's GPU delegate is flaky for FaceLandmarker (issue #6142) → CPU on iOS
    baseOptions: { modelAssetPath: f("face_landmarker.task"), delegate: (MODE === "gpu" && !IS_IOS) ? "GPU" : "CPU" },
    outputFaceBlendshapes: false, runningMode: "VIDEO", numFaces: 1,
  });
}

// ---- mic reactivity ----
async function toggleSound() {
  if (analyser) {  // turn OFF
    analyser = null;
    if (micStream) micStream.getTracks().forEach((t) => t.stop());
    micStream = null; els.sound.classList.remove("on");
    showToast("sound off"); return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") await audioCtx.resume();   // CRITICAL: starts suspended
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024; analyser.smoothingTimeConstant = 0.7;
    src.connect(analyser);
    micDest = audioCtx.createMediaStreamDestination();   // tap for recording the sound
    src.connect(micDest);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    els.sound.classList.add("on");
    showToast("listening — play your beat near the mic");
  } catch (e) { showToast("mic blocked — allow microphone"); }
}
// bass/mid/treble + onset → strong, punchy reactivity (expert-tuned bands)
function readAudio() {
  if (!analyser) { state.audio *= 0.9; state.treble = (state.treble || 0) * 0.9; state.beat = (state.beat || 0) * 0.85; return; }
  analyser.getByteFrequencyData(freqData);
  const n = freqData.length;
  let bass = 0, mid = 0, tre = 0;
  const bEnd = (n * 0.08) | 0, mEnd = (n * 0.4) | 0;
  for (let i = 0; i < n; i++) { const v = freqData[i]; if (i < bEnd) bass += v; else if (i < mEnd) mid += v; else tre += v; }
  bass = bass / (bEnd * 255); mid = mid / ((mEnd - bEnd) * 255); tre = tre / ((n - mEnd) * 255);
  const onset = Math.max(0, bass - prevBass); prevBass = bass;
  // smoothed levels
  state.audio += (bass - state.audio) * 0.35;           // bass → swell/size/bloom
  state.treble = (state.treble || 0) * 0.6 + tre * 0.4; // treble → shimmer/jitter
  // kick onset → beat pulse (decays), drives chroma split + scatter burst
  if (onset > 0.10) { state.beat = 1; triggerBurst(0.35 + onset * 1.5); state.chroma = Math.min(1, state.chroma + 0.6 + onset * 3); }
  state.beat = (state.beat || 0) * 0.82;
}

// ---- interactions ----
function triggerBurst(a = 1) { state.burst = Math.min(1, state.burst + a); }
function onTap() {
  if (booting && !looping) return;
  const now = performance.now();
  if (now - (onTap._last || 0) < 300) state.chroma = 1; else triggerBurst(1);
  onTap._last = now;
}
function cycleLook() {
  if (!looping) return;
  lookIdx = (lookIdx + 1) % LOOKS.length;
  const L = LOOKS[lookIdx];
  if (MODE === "gpu" && mat) {
    mat.uniforms.uSize.value = L.size; mat.uniforms.uLimeMix.value = L.limeMix; mat.uniforms.uUseVideo.value = L.useVideo;
    bloom.strength = (IS_MOBILE ? 0.75 : 1.0) * (L.bloom / 0.95);
  }
  showToast(L.name);
}

// ---- recording: capture the live canvas (+ mic/music) → download ----
function pickMime() {
  const c = ["video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm", "video/mp4;codecs=h264,aac", "video/mp4"];
  for (const m of c) if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
function toggleRec() {
  if (!looping) { showToast("not live yet"); return; }
  if (recording) { if (rec && rec.state !== "inactive") rec.stop(); return; }
  const cv = (MODE === "gpu" && renderer) ? renderer.domElement : c2;
  if (!cv || !cv.captureStream) { showToast("recording not supported here"); return; }
  let combined;
  try {
    const vs = cv.captureStream(30);
    combined = new MediaStream();
    vs.getVideoTracks().forEach((t) => combined.addTrack(t));
    if (micDest) micDest.stream.getAudioTracks().forEach((t) => combined.addTrack(t)); // sound, if mic is on
  } catch (e) { showToast("can't capture canvas"); return; }
  const mime = pickMime();
  try { rec = new MediaRecorder(combined, mime ? { mimeType: mime } : undefined); }
  catch (e) { showToast("recorder unsupported on this browser"); return; }
  recChunks = [];
  rec.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
  rec.onstop = () => {
    recording = false; clearTimeout(toggleRec._t);
    els.rec.classList.remove("on"); els.rec.textContent = "● Rec";
    const base = (mime || "video/webm").split(";")[0];
    const ext = base.indexOf("mp4") >= 0 ? "mp4" : "webm";
    const blob = new Blob(recChunks, { type: base });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "geecket-" + Date.now() + "." + ext;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showToast("saved " + ext.toUpperCase() + " → check downloads");
  };
  rec.start(120);          // small timeslice keeps memory low
  recording = true;
  els.rec.classList.add("on"); els.rec.textContent = "■ Stop";
  showToast(micDest ? "recording — with sound" : "recording — tap ◉ Sound first to capture audio");
  toggleRec._t = setTimeout(() => { if (recording && rec && rec.state !== "inactive") rec.stop(); }, 30000); // 30s cap
}

// ---------------------------------------------------------------------------
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now(), time = (now - state.t0) / 1000;
  if (landmarker && els.cam.readyState >= 2 && els.cam.videoWidth > 0) {
    // timestamp MUST strictly increase — a duplicate bricks MediaPipe permanently
    let ts = now; if (ts <= lastTs) ts = lastTs + 1; lastTs = ts;
    try {
      const res = landmarker.detectForVideo(els.cam, ts);
      if (res.faceLandmarks && res.faceLandmarks.length) { state.lastFace = res.faceLandmarks[0]; faceEver = true; }
    } catch (e) { /* keep last good face; never kill the loop */ }
  }
  if (!faceEver && !noFaceHinted && time > 4) {
    noFaceHinted = true;
    showToast("No face detected — point the camera at your face. On a closed-lid Mac the camera is covered: open the lid, or use your phone.");
  }
  readAudio();
  if (!analyser && now - state.t0 > state.autoBurstAt) { triggerBurst(0.8); state.autoBurstAt = (now - state.t0) + 7000 + Math.random() * 4000; }
  state.burst *= 0.94; state.chroma *= 0.85;

  computePoints(time);
  if (MODE === "gpu") renderGPU(time); else renderCPU(time);
}

// ---------------------------------------------------------------------------
// Robust camera acquisition: try progressively looser constraints so external
// / USB cams (no "user" facing) and odd resolutions still work.
async function acquireCamera() {
  const attempts = [
    { audio: false, video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } },
    { audio: false, video: { facingMode: "user" } },
    { audio: false, video: true },   // last resort: ANY camera
  ];
  let lastErr;
  for (const cons of attempts) {
    try { return await navigator.mediaDevices.getUserMedia(cons); }
    catch (e) {
      lastErr = e;
      const n = e && e.name;
      // permission / busy / hardware errors won't be fixed by looser constraints
      if (n === "NotAllowedError" || n === "SecurityError" || n === "NotReadableError" || n === "TrackStartError") throw e;
    }
  }
  throw lastErr;
}
function camMessage(e) {
  const n = (e && e.name) || "";
  if (n === "NotAllowedError" || n === "SecurityError")
    return ["Camera blocked", "Permission is denied for this site. iPhone Safari: tap 'aA' in the address bar → Website Settings → Camera → Allow (or Settings ▸ Safari ▸ Camera → Allow), then reload. Desktop: click the camera icon in the address bar → Allow. Nothing is uploaded."];
  if (n === "NotReadableError" || n === "TrackStartError" || n === "AbortError")
    return ["Camera busy", "Another app or tab is using the camera. Close other camera tabs (incl. GEECKET STUDIO), and Zoom / FaceTime / Photo Booth, then RETRY."];
  if (n === "NotFoundError" || n === "DevicesNotFoundError" || n === "OverconstrainedError")
    return ["No camera found", "No camera is available. On a Mac driving an external monitor with the laptop LID CLOSED (clamshell), the built-in camera is off — open the lid, or plug in a USB / iPhone Continuity camera, then RETRY."];
  return ["Camera unavailable", "Couldn't start the camera (" + (n || "unknown") + "). Close other camera apps/tabs or try another browser, then RETRY."];
}

async function start() {
  if (booting) return;
  booting = true;
  els.err.classList.remove("show");
  els.intro.style.opacity = "0";
  setTimeout(() => (els.intro.style.display = "none"), 600);
  els.load.classList.add("show");
  lastErr = "";
  showDiag();   // live readout from the first moment, so a stall is never silent

  // 1. camera first (keeps iOS user-gesture intact — no await before getUserMedia)
  setStatus("requesting camera…");
  let stream;
  try {
    stream = await acquireCamera();
  } catch (e) {
    booting = false;
    lastErr = (e && e.name || "") + (e && e.message ? " " + e.message : "");
    const [t, m] = camMessage(e);
    return showError(t, m);
  }
  setStatus("waking video…");
  els.cam.srcObject = stream;
  await els.cam.play().catch(() => {});
  // wait for ACTUAL frames (videoWidth>0 && readyState>=2), not just metadata
  await withTimeout(new Promise((r) => {
    const check = () => { if (els.cam.videoWidth > 0 && els.cam.readyState >= 2) r(); else requestAnimationFrame(check); };
    check();
  }), 9000, "video frames").catch(() => {});
  if (!els.cam.videoWidth) {
    booting = false;
    lastErr = "no-frames rs" + els.cam.readyState;
    return showError("Camera gave no image", "The camera connected but sent no video (it may be in use by another app, or the browser blocked frames). Close other camera apps/tabs and RETRY, or try Safari/Chrome.");
  }
  camAspect = (els.cam.videoWidth / els.cam.videoHeight) || 1;

  // 2. choose render path by WebGL2 availability — this is the all-users fix
  MODE = hasWebGL2() ? "gpu" : "cpu";

  if (MODE === "gpu") {
    setStatus("loading 3D engine…");
    try { await withTimeout(loadThree(), 15000, "three"); initGPU(); }
    catch (e) { MODE = "cpu"; }       // any GPU hiccup → fall back to CPU (needs no three)
  }
  if (MODE === "cpu") {
    setStatus("starting lite renderer…");
    try { initCPU(); }
    catch (e) { booting = false; return showError("Can't draw here", "This browser blocked both WebGL and 2D canvas. Try Safari or Chrome. (" + (e && e.message || e) + ")"); }
  }

  // 3. face engine (self-hosted, same origin)
  setStatus("loading face engine…");
  try { await withTimeout(initFace(), 30000, "face engine"); }
  catch (e) {
    booting = false;
    const m = (e && e.message || e) + "";
    lastErr = "face: " + m.slice(0, 40);
    return showError("Face engine failed",
      (m.indexOf("timed out") >= 0 ? "The face engine took too long to load on this connection. " : "Couldn't start the face engine. ") +
      "Try a stronger Wi-Fi/data connection and RETRY. (" + m + ")");
  }

  // 4. build + go live
  buildPlan();
  if (MODE === "gpu") buildGPUCloud();
  state.t0 = performance.now();
  els.load.classList.remove("show");
  els.hud.classList.add("show");
  els.brand.classList.add("show");
  els.modeTag.textContent = MODE === "cpu" ? "· lite" : "";
  showToast(MODE === "cpu" ? "lite mode · tap = burst · ◉ sound" : "tap = burst · double-tap = glitch · ◉ sound");
  if (!looping) { looping = true; frame(); }
}
</script>
